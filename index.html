<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #f0f0f0;
      align-items: center;
      justify-content: center;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    #pdf-container {
      width: 80%;
      height: 80%;
      border: 2px solid #333;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      background-color: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .download-btn {
      margin: 15px;
      padding: 10px 20px;
      background-color: #007BFF;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
    }

    .download-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  
  <div id="pdf-container">
    <!-- toolbar=0 ব্যবহার করা হলো যাতে কোনো control না দেখায় -->
    <iframe id="pdf-frame" src="pdf.pdf#toolbar=0"></iframe>
  </div>

  <a class="download-btn" href="pdf.pdf" download="pdf.pdf">Download PDF</a>

  <script>
    const pdfFrame = document.getElementById('pdf-frame');
    pdfFrame.onload = () => {
      console.log('PDF লোড হয়েছে (toolbar hidden)');
    };
  </script>

</body>
</html>
